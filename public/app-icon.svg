<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background with rounded corners -->
  <rect width="512" height="512" rx="115" fill="#10B981"/>

  <!-- Dollar sign - perfectly centered -->
  <g transform="translate(256, 256)">
    <!-- Vertical line of dollar sign -->
    <rect x="-18" y="-180" width="36" height="360" rx="18" fill="white"/>

    <!-- Top curve -->
    <path d="M -80,-100 Q -80,-150 -20,-150 L 80,-150 Q 120,-150 120,-100 Q 120,-60 80,-60 L -50,-60"
          stroke="white" stroke-width="45" fill="none" stroke-linecap="round"/>

    <!-- Bottom curve -->
    <path d="M 80,100 Q 80,150 20,150 L -80,150 Q -120,150 -120,100 Q -120,60 -80,60 L 50,60"
          stroke="white" stroke-width="45" fill="none" stroke-linecap="round"/>
  </g>
</svg>
